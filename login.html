<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css"/>
    <title>Isla Meyn | Access</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00020a 0%, #001b44 100%);
        }
        .login-container {
            background: white;
            border-radius: 8px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 900;
            color: #00020a;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }
        .login-subtitle {
            font-size: 14px;
            color: #44474f;
            margin: 0;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #00020a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #c5c6d0;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #bb0027;
            box-shadow: 0 0 0 3px rgba(187, 0, 39, 0.1);
        }
        .login-button {
            width: 100%;
            padding: 12px 24px;
            background-color: #bb0027;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s ease;
        }
        .login-button:hover {
            opacity: 0.9;
        }
        .login-button:active {
            transform: scale(0.98);
        }
        .error-message {
            display: none;
            color: #ba1a1a;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background-color: #ffdad6;
            border-radius: 4px;
            text-align: center;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="images/images.png" alt="Isla Meyn" class="login-logo"/>
            <h1 class="login-title">ISLA MEYN</h1>
            <p class="login-subtitle">Athlete Profile</p>
        </div>
        
        <div class="error-message" id="errorMessage">Incorrect passcode. Please try again.</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="passcode">Passcode</label>
                <input 
                    type="password" 
                    id="passcode" 
                    placeholder="Enter passcode"
                    autocomplete="off"
                />
            </div>
            <button type="submit" class="login-button">Unlock</button>
        </form>
    </div>

    <script>
        const CORRECT_HASH = '1a774e9dbd85a0bd8284a96c862939e4cc4bdbf61a11f507b2a4a80d08768529';

        async function sha256(text) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        window.addEventListener('load', function() {
            if (localStorage.getItem('islaAuthenticated') === 'true') {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const passcode = document.getElementById('passcode').value;
            const hash = await sha256(passcode);

            if (hash === CORRECT_HASH) {
                localStorage.setItem('islaAuthenticated', 'true');
                localStorage.setItem('authTime', new Date().getTime());
                window.location.href = 'index.html';
            } else {
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.classList.add('show');
                document.getElementById('passcode').value = '';
                document.getElementById('passcode').focus();
                setTimeout(function() {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });
    </script>
</body>
</html>
